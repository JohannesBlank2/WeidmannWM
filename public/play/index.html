<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Weidmann WM — Handy</title>
  <link rel="stylesheet" href="/shared/style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header.bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; border-bottom: 1px solid var(--line); background: var(--bg2);
    }
    header.bar .who { font-weight: 700; }
    main { flex: 1; display: flex; flex-direction: column; padding: 18px; gap: 16px; overflow: auto; }

    /* Spieler-Auswahl */
    .player-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .player-btn {
      padding: 26px 10px; font-size: 1.3rem; font-weight: 800; border-radius: 8px;
      border: 3px solid var(--pc); background: var(--panel); color: var(--text);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .player-btn span { font-size: .85rem; font-weight: 600; color: var(--muted); }
    .player-btn.active { background: var(--pc); color: #111; }
    .player-btn.active span { color: rgba(0,0,0,.7); }

    /* Pick-Bereich (Kategorie/Spiel-Auswahl + Warten) */
    #pick-area:empty { display: none; }
    .pick-title { text-align: center; font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; }
    .pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pick-btn {
      padding: 22px 10px; font-size: 1.15rem; font-weight: 800; border-radius: 8px;
      border: 2px solid var(--accent); background: var(--panel); color: var(--text);
    }
    .pick-btn .sub { display: block; font-size: .8rem; font-weight: 500; color: var(--muted); margin-top: 4px; }
    .pick-sub { text-align: center; color: var(--muted); margin: -4px 0 12px; }
    .choice-list { display: grid; gap: 10px; margin: 12px 0; }
    .choice-pill {
      border: 1px solid var(--line); background: var(--panel); border-radius: 8px;
      padding: 12px; display: flex; flex-direction: column; gap: 4px;
    }
    .choice-pill span { color: var(--muted); font-size: .85rem; }
    .spin-btn {
      width: 100%; padding: 24px 12px; font-size: 1.8rem; font-weight: 900;
      border-color: var(--accent); background: var(--accent); color: #111;
    }
    .bet-label { display: block; margin: 14px 0 6px; color: var(--muted); font-weight: 800; }
    .bet-input {
      width: 100%; border: 1px solid var(--line); background: #13070a; color: var(--text);
      border-radius: 8px; padding: 14px; font: inherit; font-weight: 800;
    }
    .waiting { text-align: center; color: var(--muted); padding: 30px 10px; }
    .waiting .big { font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }

    /* Buzzer */
    #buzzer-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
    #buzzer {
      width: min(70vw, 320px); height: min(70vw, 320px); border-radius: 50%;
      font-size: 2rem; font-weight: 900; color: #fff; border: none;
      background: radial-gradient(circle at 35% 30%, #ff5a5f, #b00d12);
      box-shadow: 0 12px 0 #6d0a0d, 0 18px 30px rgba(0,0,0,.5);
    }
    #buzzer:active { transform: translateY(8px); box-shadow: 0 4px 0 #6d0a0d, 0 8px 16px rgba(0,0,0,.5); }
    #buzzer:disabled { background: radial-gradient(circle at 35% 30%, #555, #333); box-shadow: 0 8px 0 #222; }
    #buzz-status { font-size: 1.3rem; min-height: 1.6em; text-align: center; font-weight: 700; }

    #game-area:empty { display: none; }
    #game-area { width: 100%; }
    .hint { text-align: center; color: var(--muted); }
  </style>
</head>
<body>
  <header class="bar">
    <div class="who" id="who">Nicht zugeordnet</div>
    <span class="conn-badge offline" data-conn>getrennt</span>
  </header>

  <main>
    <!-- Schritt 1: Spieler waehlen -->
    <section id="player-select" class="card">
      <h2>Wer bist du?</h2>
      <div class="player-grid" id="player-grid"></div>
    </section>

    <!-- Schritt 2: Spielbereich (Kategorie / Spin / Buzzer / Spiel-Modul) -->
    <section id="play-area" style="display:none; flex:1; flex-direction:column; gap:14px;">
      <div id="pick-area"></div>
      <div id="game-area"></div>
      <div id="buzzer-wrap">
        <div id="buzz-status">—</div>
        <button id="buzzer" disabled>BUZZ</button>
        <div class="hint" id="phase-hint"></div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>window.APP_ROLE = 'play';</script>
  <script src="/shared/client.js"></script>
  <script src="/shared/game-loader.js"></script>
  <script src="./play.js"></script>
</body>
</html>
