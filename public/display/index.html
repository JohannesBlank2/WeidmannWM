<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Weidmann WM — Display</title>
  <link rel="stylesheet" href="/shared/style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    body.table-mode header.bar,
    body.table-mode footer.scores { display: none; }
    body.table-mode main.stage { min-height: 100vh; padding: 18px; }
    header.bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #2c0d14, var(--bg2));
      box-shadow: 0 0 34px rgba(255,47,79,.16);
    }
    header.bar h1 {
      font-size: 1.6rem; margin: 0; color: var(--accent);
      text-shadow: 0 0 14px rgba(255,209,92,.45);
    }
    .phase-pill {
      padding: 6px 16px; border-radius: 999px; background: var(--panel);
      border: 1px solid var(--line); font-size: 1rem; text-transform: capitalize;
    }
    main.stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255,47,79,.09), transparent 24%, transparent 76%, rgba(255,209,92,.08)),
        linear-gradient(180deg, transparent, rgba(0,0,0,.26));
    }
    #content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .idle { text-align: center; color: var(--muted); }
    .idle .big { font-size: 3rem; color: var(--text); margin-bottom: 10px; }
    .game-head { text-align: center; }
    .game-head .title { font-size: 2.4rem; font-weight: 800; }
    .game-head .meta { color: var(--muted); margin-top: 6px; font-size: 1.2rem; }

    /* Spiel-Auswahl (3 Karten) */
    .choices-wrap { text-align: center; width: 100%; }
    .choices-title { font-size: 1.6rem; margin-bottom: 24px; }
    .choices { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .choice-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      padding: 28px 32px; min-width: 220px;
    }
    .choice-card .cn { font-size: 1.8rem; font-weight: 800; }
    .choice-card .cm { color: var(--muted); margin-top: 8px; font-size: 1.1rem; }

    /* Lobby / Rundentisch */
    .table-scene {
      position: relative; width: min(1540px, 96vw); height: min(860px, 94vh);
      margin: 0 auto;
    }
    .table-title {
      position: absolute; left: 50%; top: 0; transform: translateX(-50%);
      z-index: 3; text-align: center; pointer-events: none;
    }
    .table-brand {
      color: var(--accent); font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 900; letter-spacing: .18em;
      text-shadow: 0 0 18px rgba(255,209,92,.42);
      white-space: nowrap;
    }
    .poker-table {
      position: absolute; left: 50%; top: 53%; transform: translate(-50%, -50%);
      width: min(1120px, 74vw); height: min(540px, 58vh);
      border-radius: 50%;
      background:
        radial-gradient(circle at 53% 45%, rgba(67, 158, 105, .35), transparent 0 22%, transparent 42%),
        radial-gradient(ellipse at center, #155f43 0%, #0f4a36 56%, #092b22 100%);
      border: 14px solid #d8b350;
      box-shadow:
        0 0 0 7px rgba(56, 33, 6, .78),
        inset 0 0 0 7px rgba(5, 22, 17, .75),
        inset 0 26px 70px rgba(255,255,255,.08),
        0 26px 56px rgba(0,0,0,.48);
      display: flex; align-items: center; justify-content: center;
    }
    .table-center { text-align: center; padding: 20px; }
    .table-kicker {
      color: var(--accent); text-transform: uppercase; letter-spacing: .32em;
      font-size: 1rem; font-weight: 900; margin-bottom: 10px;
    }
    .table-main {
      color: #fff8df; font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(3rem, 6vw, 5.4rem); font-weight: 900;
      text-shadow: 0 4px 18px rgba(0,0,0,.5);
    }
    .table-status {
      display: inline-flex; align-items: center; gap: 9px; margin-top: 14px;
      padding: 9px 18px; border-radius: 999px;
      background: rgba(5, 31, 22, .78); border: 1px solid rgba(255,209,92,.28);
      color: #fff3bf; font-size: 1.05rem; font-weight: 800;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #47d784;
      box-shadow: 0 0 13px rgba(71,215,132,.8);
    }
    .table-seat {
      position: absolute; z-index: 4; min-width: 190px;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      text-align: center;
    }
    .seat-0 { left: 20%; top: 4%; }
    .seat-1 { right: 20%; top: 4%; }
    .seat-2 { left: 1%; top: 48%; transform: translateY(-50%); }
    .seat-3 { right: 1%; top: 48%; transform: translateY(-50%); }
    .seat-4 { left: 50%; bottom: 1%; transform: translateX(-50%); }
    .seat-avatar {
      width: 148px; height: 148px; border-radius: 50%;
      display: grid; place-items: center;
      border: 8px solid #d8b350; background: linear-gradient(180deg, var(--pc), #16080c);
      color: #fff8df; font-size: 2.2rem; font-weight: 900;
      overflow: hidden;
      box-shadow: 0 14px 34px rgba(0,0,0,.42), inset 0 0 0 3px rgba(0,0,0,.2);
    }
    .seat-avatar img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .seat-avatar.connected { box-shadow: 0 14px 34px rgba(0,0,0,.42), 0 0 0 4px rgba(71,215,132,.5); }
    .seat-name {
      color: #fff8df; font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem; font-weight: 900; text-shadow: 0 3px 12px rgba(0,0,0,.65);
      max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .coin-pill {
      display: inline-flex; align-items: center; gap: 8px;
      min-height: 50px; padding: 7px 20px; border-radius: 999px;
      background: rgba(9, 18, 13, .88); border: 1px solid #b58a27;
      color: #fff1ae; font-size: 1.9rem; font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(255,209,92,.12), 0 8px 20px rgba(0,0,0,.32);
    }
    .coin-pill span {
      width: 24px; height: 24px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff7bd, #d8a527 70%);
      box-shadow: 0 0 8px rgba(255,209,92,.48);
    }

    /* Kategorie-Spin: Slot Machine */
    .slot-wrap { width: min(1120px, 96vw); text-align: center; }
    .slot-machine {
      position: relative; padding: 24px; border: 2px solid #9a332a; border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,209,92,.16), transparent 18%),
        linear-gradient(180deg, #3a0d17, #13060a);
      box-shadow: 0 18px 48px rgba(0,0,0,.48), inset 0 0 0 3px rgba(255,209,92,.12);
    }
    .slot-machine::before {
      content: "WEIDMANN EM"; display: block; margin-bottom: 18px;
      color: var(--accent); font-weight: 900; font-size: 1.35rem;
      letter-spacing: .18em; text-shadow: 0 0 16px rgba(255,209,92,.55);
    }
    .reels {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px; align-items: stretch;
    }
    .reel-window {
      height: 160px; overflow: hidden; padding: 10px;
      border: 2px solid #f6c755; border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 35%, rgba(0,0,0,.35)),
        #12080b;
      box-shadow: inset 0 0 22px rgba(0,0,0,.72), 0 0 16px rgba(255,209,92,.18);
    }
    .reel-track {
      display: flex; flex-direction: column; gap: 12px;
      will-change: transform; transform: translateY(0);
    }
    .reel-track.spinning {
      animation: reel-spin var(--spin-duration, 4400ms) cubic-bezier(.08,.72,.13,1) forwards;
    }
    .slot-card {
      height: 136px; border-radius: 8px; flex: 0 0 136px;
      background: linear-gradient(180deg, #fff8df, #f3d79a);
      border: 2px solid #8b5420; color: #251005;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px; text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
    }
    .slot-card .cn { font-size: clamp(1.1rem, 2.2vw, 1.55rem); font-weight: 900; line-height: 1.08; }
    .slot-card .cm { color: #7b3d17; margin-top: 8px; font-size: 1rem; font-weight: 700; }
    .slot-card.winner-card {
      background: linear-gradient(180deg, #fff2a8, #ffd15c);
      border-color: #fff3bd;
      box-shadow: 0 0 0 3px rgba(255,209,92,.2) inset, 0 0 20px rgba(255,209,92,.4);
    }
    .near-miss-row {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px; margin-top: 16px;
    }
    .near-miss-card {
      min-height: 58px; display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,209,92,.35); border-radius: 8px;
      background: rgba(12, 5, 8, .68); color: var(--muted);
      padding: 8px 10px; font-weight: 800;
    }
    .slot-result {
      display: grid; gap: 18px; width: min(1060px, 96vw); margin: 0 auto 18px;
    }
    @keyframes reel-spin {
      from { transform: translateY(0); }
      to { transform: translateY(calc(-1 * var(--reel-shift, 0px))); }
    }

    /* Feste Show-Spiel-Intros */
    .bandit-wrap {
      width: min(1220px, 96vw); min-height: min(900px, 94vh);
      margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
    }
    .bandit-machine {
      position: relative; width: min(980px, 78vw);
      padding: 116px 54px 46px;
      border: 7px solid #090305; border-radius: 26px;
      background:
        linear-gradient(180deg, #29b6d8 0 38%, #f3a43c 38% 55%, #8f3fa8 55% 63%, #df1d28 63% 100%);
      box-shadow:
        0 28px 60px rgba(0,0,0,.55),
        inset 0 0 0 5px rgba(255,239,168,.44),
        inset 0 -18px 0 rgba(0,0,0,.18);
    }
    .bandit-dome {
      position: absolute; left: 50%; top: -72px; transform: translateX(-50%);
      width: 74%; height: 140px; padding-top: 26px;
      border: 7px solid #090305; border-bottom: 0;
      border-radius: 160px 160px 22px 22px;
      background: linear-gradient(135deg, #a94eb6, #f4b044 65%, #ffe864);
      text-align: center; box-shadow: inset 0 0 0 5px rgba(255,255,255,.16);
      overflow: hidden;
    }
    .bandit-stars {
      color: #fff45e; font-size: 2.6rem; line-height: 1;
      text-shadow: 3px 3px 0 #090305, 0 0 18px rgba(255,244,94,.42);
    }
    .bandit-sign {
      margin-top: 6px; color: #fff8df; font-size: clamp(1.5rem, 3vw, 2.45rem);
      font-weight: 900; letter-spacing: .18em;
      text-shadow: 4px 4px 0 #090305, 0 0 18px rgba(255,209,92,.45);
    }
    .bandit-lights {
      position: absolute; left: 34px; right: 34px; top: 72px;
      display: flex; justify-content: space-between; padding: 9px 14px;
      border: 5px solid #090305; border-radius: 999px;
      background: #d71928;
    }
    .bandit-lights span {
      width: 23px; height: 23px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff9b9, #f4b044 55%, #5d2509 80%);
      border: 3px solid #090305;
      animation: bandit-light .72s steps(2, end) infinite;
      animation-delay: calc(var(--i) * .05s);
    }
    .bandit-face {
      position: relative; z-index: 2;
      padding: 24px; border: 7px solid #090305; border-radius: 18px;
      background:
        linear-gradient(90deg, #ffe071 0 9%, transparent 9% 91%, #ffe071 91%),
        linear-gradient(180deg, #33c0df, #0f91b3);
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.16);
    }
    .bandit-reels {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }
    .bandit-reel-window {
      height: 194px; overflow: hidden;
      border: 7px solid #090305; border-radius: 16px;
      background: #fff6cf; padding: 7px;
      box-shadow: inset 0 0 0 5px #c97829, inset 0 0 26px rgba(0,0,0,.5);
    }
    .bandit-reel-track {
      --bandit-symbol-height: 166px;
      --bandit-gap: 14px;
      display: flex; flex-direction: column; gap: var(--bandit-gap);
      will-change: transform; transform: translateY(0);
    }
    .bandit-reel-track.spinning {
      animation: bandit-reel-spin var(--spin-duration, 5600ms) cubic-bezier(.08,.74,.13,1) forwards;
    }
    .bandit-symbol {
      height: var(--bandit-symbol-height); flex: 0 0 var(--bandit-symbol-height); padding: 14px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; border: 4px solid #090305;
      background: linear-gradient(180deg, #2de1c2, #0e8c9a);
      color: #071014; text-align: center;
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.15);
    }
    .bandit-symbol span {
      display: block; font-size: clamp(1.25rem, 2vw, 1.9rem);
      line-height: 1.05; font-weight: 900;
    }
    .bandit-symbol.winner {
      background: linear-gradient(180deg, #fff7a8, #ffd15c);
      color: #241104;
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.22), 0 0 24px rgba(255,209,92,.48);
    }
    .bandit-console {
      position: relative; z-index: 2; display: grid;
      grid-template-columns: 74px 74px 74px 1fr;
      gap: 22px; align-items: center;
      margin-top: 22px; padding: 18px 22px;
      border: 6px solid #090305; border-radius: 16px;
      background: linear-gradient(180deg, #d5822b, #f0a13a);
    }
    .bandit-button {
      width: 62px; height: 34px; border-radius: 12px;
      border: 5px solid #090305;
      background: linear-gradient(180deg, #36d2ec, #117f99);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.22);
    }
    .bandit-button.red { background: linear-gradient(180deg, #fff8df 0 35%, #e5232e 35%); }
    .bandit-plaque {
      justify-self: end; color: #090305; font-size: clamp(1.4rem, 2.3vw, 2.1rem);
      font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
    }
    .bandit-base {
      position: relative; z-index: 2; margin: 20px auto 0;
      width: 76%; min-height: 92px; display: grid; place-items: center;
      border: 7px solid #090305; border-radius: 0 0 32px 32px;
      background: linear-gradient(135deg, #ffe071, #fff8df 45%, #ffe071 46% 100%);
      color: #090305; font-size: clamp(1.7rem, 3.2vw, 3.2rem);
      font-weight: 900; text-align: center; padding: 10px 22px;
    }
    .bandit-prize { max-width: 100%; overflow-wrap: anywhere; }
    .bandit-machine.result-mode {
      width: min(760px, 78vw);
      padding: 78px 38px 28px;
    }
    .bandit-machine.result-mode .bandit-dome {
      top: -48px; height: 100px; padding-top: 18px;
    }
    .bandit-machine.result-mode .bandit-stars { font-size: 1.8rem; }
    .bandit-machine.result-mode .bandit-sign { font-size: clamp(1.1rem, 2vw, 1.7rem); }
    .bandit-machine.result-mode .bandit-lights { top: 50px; left: 28px; right: 28px; padding: 7px 12px; }
    .bandit-machine.result-mode .bandit-lights span { width: 17px; height: 17px; border-width: 2px; }
    .bandit-machine.result-mode .bandit-face { padding: 16px; border-width: 5px; }
    .bandit-machine.result-mode .bandit-reels { gap: 14px; }
    .bandit-machine.result-mode .bandit-reel-window { height: 132px; border-width: 5px; padding: 5px; }
    .bandit-machine.result-mode .bandit-reel-track { --bandit-symbol-height: 112px; --bandit-gap: 14px; }
    .bandit-machine.result-mode .bandit-symbol { padding: 10px; border-width: 3px; }
    .bandit-machine.result-mode .bandit-symbol span { font-size: clamp(1rem, 1.45vw, 1.35rem); }
    .bandit-machine.result-mode .bandit-console { display: none; }
    .bandit-machine.result-mode .bandit-base {
      width: 82%; min-height: 64px; margin-top: 16px;
      font-size: clamp(1.3rem, 2.4vw, 2.2rem);
    }
    .bandit-machine.result-mode .bandit-lever {
      right: -80px; top: 154px; transform: scale(.68); transform-origin: top left;
    }
    .bandit-lever {
      position: absolute; right: -112px; top: 226px;
      width: 112px; height: 292px;
    }
    .lever-stick {
      position: absolute; left: 45px; top: 48px;
      width: 22px; height: 188px; border-radius: 999px;
      border: 6px solid #090305;
      background: linear-gradient(90deg, #fff8df, #a6d9e5 65%, #f8fbff);
      transform-origin: 50% 100%;
    }
    .lever-knob {
      position: absolute; left: 18px; top: 0;
      width: 76px; height: 76px; border-radius: 50%;
      border: 7px solid #090305;
      background: radial-gradient(circle at 35% 30%, #fff, #92c9d2 48%, #5a7a81 72%);
      transform-origin: 50% 260px;
    }
    .bandit-machine.pulling .lever-stick,
    .bandit-machine.pulling .lever-knob {
      animation: lever-pull 1.15s cubic-bezier(.2,.75,.22,1) forwards;
    }
    .cornhole-reveal {
      width: min(1180px, 96vw);
      min-height: min(760px, 88vh);
      margin: 0 auto;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; text-align: center;
    }
    .cornhole-reveal.complete {
      min-height: min(470px, 54vh);
    }
    .cornhole-copy {
      display: grid; gap: 6px;
      animation: cornhole-copy-in .45s ease both;
    }
    .cornhole-reveal.complete .cornhole-copy { display: none; }
    .cornhole-kicker {
      color: var(--accent); text-transform: uppercase; letter-spacing: .22em;
      font-size: clamp(1.05rem, 1.7vw, 1.45rem); font-weight: 900;
      text-shadow: 0 0 18px rgba(255,209,92,.28);
    }
    .cornhole-sub {
      color: var(--muted); font-size: clamp(1rem, 1.6vw, 1.35rem); font-weight: 800;
    }
    .cornhole-table {
      position: relative;
      width: min(980px, 90vw);
      min-height: 500px;
      padding: 44px 52px 48px;
      border: 8px solid #d8b75a;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(30,126,88,.72), rgba(6,60,43,.96) 64%, rgba(4,35,26,.98)),
        linear-gradient(180deg, #0f694d, #063326);
      box-shadow:
        0 30px 60px rgba(0,0,0,.52),
        inset 0 0 0 5px rgba(255,248,223,.14),
        inset 0 0 80px rgba(0,0,0,.32);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .cornhole-slots {
      position: relative; z-index: 2;
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(34px, 6vw, 82px);
      width: min(720px, 78vw);
    }
    .cornhole-slot {
      position: relative;
      height: 310px;
      border: 2px dashed rgba(244,226,160,.72);
      border-radius: 16px;
      background: rgba(3, 29, 22, .52);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.04), inset 0 0 34px rgba(0,0,0,.42);
      display: grid; place-items: center;
      overflow: visible;
    }
    .cornhole-slot::before {
      content: "";
      position: absolute; inset: 13px;
      border: 1px solid rgba(244,226,160,.24);
      border-radius: 10px;
    }
    .cornhole-slot-label {
      position: absolute; left: 50%; top: -34px; transform: translateX(-50%);
      color: #f4e2a0; font-weight: 900; letter-spacing: .14em;
      text-transform: uppercase; font-size: .88rem;
    }
    .cornhole-card {
      position: relative;
      width: min(230px, 26vw);
      aspect-ratio: 5 / 7;
      perspective: 1400px;
      transform: translateY(0) rotate(0deg);
      filter: drop-shadow(0 20px 22px rgba(0,0,0,.42));
    }
    .cornhole-card.animate {
      opacity: 0;
      animation:
        cornhole-card-deal var(--card-duration, 4300ms) cubic-bezier(.12,.76,.15,1) forwards;
      animation-delay: calc(var(--card-index) * 360ms);
    }
    .cornhole-card-inner {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      transform: rotateY(180deg);
    }
    .cornhole-card.animate .cornhole-card-inner {
      animation: cornhole-card-flip var(--card-duration, 4300ms) cubic-bezier(.14,.7,.18,1) forwards;
      animation-delay: calc(var(--card-index) * 360ms);
    }
    .cornhole-card.shown .cornhole-card-inner {
      transform: rotateY(0deg);
    }
    .cornhole-card-face {
      position: absolute; inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      border: 7px solid #fff8df;
      box-shadow: inset 0 0 0 3px rgba(0,0,0,.12);
      display: grid; place-items: center;
      overflow: hidden;
    }
    .cornhole-card-face.back {
      transform: rotateY(180deg);
      background:
        linear-gradient(45deg, rgba(255,248,223,.18) 25%, transparent 25% 50%, rgba(255,248,223,.18) 50% 75%, transparent 75%),
        linear-gradient(135deg, #12386f, #8d1f2d);
      background-size: 28px 28px, auto;
    }
    .cornhole-card-pattern {
      width: 118px; height: 118px; border-radius: 50%;
      display: grid; place-items: center;
      background: rgba(255,248,223,.92);
      color: #8d1f2d; font-size: 4.2rem; font-weight: 950;
      box-shadow: 0 0 0 8px rgba(216,183,90,.82), 0 0 26px rgba(0,0,0,.32);
    }
    .cornhole-card-face.front {
      background: linear-gradient(180deg, #fff8df, #f5e2b0);
      color: #14110b;
      grid-template-rows: auto 1fr auto;
      padding: 18px;
    }
    .cornhole-card-corner {
      justify-self: start;
      color: #8d1f2d; font-size: 2.1rem; font-weight: 950; line-height: 1;
    }
    .cornhole-card-title {
      align-self: center;
      color: #063326;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2rem, 3.5vw, 3.5rem);
      line-height: .95; font-weight: 950;
      text-shadow: 0 1px 0 #fff;
      overflow-wrap: anywhere;
    }
    .cornhole-card-suit {
      justify-self: end;
      color: #8d1f2d; font-size: 2.5rem; line-height: 1;
    }
    .cornhole-result {
      margin-top: 28px;
      min-width: min(560px, 72vw);
      padding: 18px 28px; border-radius: 8px;
      background: rgba(4, 41, 31, .86);
      border: 1px solid rgba(244,226,160,.42);
      color: #f4e2a0; opacity: 1;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 18px 34px rgba(0,0,0,.36);
    }
    .cornhole-reveal.dealing .cornhole-result {
      opacity: 0;
      animation: cornhole-result-pop .34s cubic-bezier(.18,.84,.2,1.18) var(--card-result-delay, 3840ms) forwards;
    }
    .cornhole-result div {
      text-transform: uppercase; letter-spacing: .2em;
      font-size: clamp(.85rem, 1.2vw, 1rem); font-weight: 900;
    }
    .cornhole-result b {
      display: block; margin-top: 6px;
      color: #fff8df; font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(3rem, 5.6vw, 5.8rem); line-height: .9;
      text-shadow: 0 0 20px rgba(244,226,160,.28);
    }
    .intro-reveal {
      width: min(920px, 92vw); min-height: min(600px, 86vh);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
    }
    .intro-kicker {
      color: var(--accent); text-transform: uppercase; letter-spacing: .22em;
      font-size: clamp(1.1rem, 2vw, 1.7rem); font-weight: 900;
    }
    .intro-title {
      margin-top: 18px; font-size: clamp(4rem, 9vw, 8rem);
      font-family: Georgia, 'Times New Roman', serif; font-weight: 900;
      color: #fff8df; text-shadow: 0 8px 28px rgba(0,0,0,.58), 0 0 24px rgba(255,209,92,.28);
    }
    .intro-meta { margin-top: 18px; color: var(--muted); font-size: clamp(1.2rem, 2.4vw, 2rem); font-weight: 800; }
    .roulette-reveal {
      width: min(1180px, 96vw);
      min-height: min(880px, 94vh);
      margin: 0 auto;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; text-align: center;
    }
    .roulette-reveal.complete {
      width: min(1180px, 96vw);
      min-height: min(560px, 62vh);
    }
    .roulette-copy {
      display: grid; gap: 6px;
      animation: roulette-copy-in .45s ease both;
    }
    .roulette-reveal.complete .roulette-copy { display: none; }
    .roulette-kicker {
      color: var(--accent); text-transform: uppercase; letter-spacing: .22em;
      font-size: clamp(1.05rem, 1.7vw, 1.45rem); font-weight: 900;
      text-shadow: 0 0 18px rgba(255,209,92,.24);
    }
    .roulette-sub {
      color: var(--muted); font-size: clamp(1rem, 1.6vw, 1.35rem); font-weight: 800;
    }
    .roulette-stage {
      position: relative;
      width: min(640px, 68vh, 78vw);
      aspect-ratio: 1;
      display: grid; place-items: center;
      animation: roulette-stage-in .62s ease both;
    }
    .roulette-reveal.complete .roulette-stage { width: min(450px, 42vh, 72vw); }
    .roulette-svg {
      width: 100%; height: 100%; overflow: visible;
      filter: drop-shadow(0 28px 42px rgba(0,0,0,.48));
    }
    .roulette-outer {
      fill: #d8b75a; stroke: #f4e2a0; stroke-width: 12;
      filter: url(#roulette-glow);
    }
    .roulette-rail {
      fill: none; stroke: #04291f; stroke-width: 22;
    }
    .roulette-wheel-disc {
      transform-origin: 300px 300px;
      transform-box: view-box;
      transform: rotate(var(--wheel-final, 0deg));
    }
    .roulette-wheel-disc.spinning {
      animation: roulette-wheel-spin var(--roulette-duration, 4600ms) cubic-bezier(.08,.72,.06,1) forwards;
    }
    .roulette-sector {
      stroke: #d8b75a; stroke-width: 3.4;
      transition: filter .2s ease;
    }
    .roulette-pocket {
      fill: rgba(244,226,160,.12);
      stroke: rgba(244,226,160,.44);
      stroke-width: 2;
    }
    .roulette-segment.c0 .roulette-sector { fill: #0a4a35; }
    .roulette-segment.c1 .roulette-sector { fill: #063326; }
    .roulette-segment text {
      fill: #fff8df; font-size: 10px; font-weight: 900;
      paint-order: stroke; stroke: rgba(3,10,8,.84); stroke-width: 3px; stroke-linejoin: round;
      letter-spacing: .02em; dominant-baseline: middle;
    }
    .roulette-segment.target text {
      fill: #fff4a8; font-size: 18px;
      stroke-width: 4px;
    }
    .roulette-segment.target .roulette-sector {
      fill: #0e5a41;
    }
    .roulette-reveal.spinning .roulette-segment.target .roulette-sector {
      animation: roulette-target-glow .55s ease var(--glow-delay, 3800ms) forwards;
    }
    .roulette-reveal.complete .roulette-segment.target .roulette-sector {
      filter: drop-shadow(0 0 16px rgba(244,226,160,.86));
    }
    .roulette-reveal.finished .roulette-segment.target .roulette-sector {
      filter: drop-shadow(0 0 16px rgba(244,226,160,.86));
    }
    .roulette-pocket-ring {
      fill: none; stroke: rgba(216,183,90,.72); stroke-width: 5;
    }
    .roulette-inner-ring {
      fill: #073b2c; stroke: #d8b75a; stroke-width: 6;
    }
    .roulette-hub {
      fill: url(#roulette-hub-gradient);
      stroke: #f4e2a0; stroke-width: 5;
    }
    .roulette-hub-dot {
      fill: #fff8df; opacity: .9;
    }
    .roulette-pointer {
      position: absolute; right: -18px; top: 50%; z-index: 7;
      width: 0; height: 0; transform: translateY(-50%);
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-right: 34px solid #f4e2a0;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.42)) drop-shadow(0 0 11px rgba(244,226,160,.45));
    }
    .roulette-ball-layer {
      position: absolute; inset: 0; z-index: 6;
      pointer-events: none;
      transform-origin: 50% 50%;
      transform: rotate(0deg);
    }
    .roulette-ball {
      position: absolute; left: 50%; top: 6%; transform: translate(-50%, -50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: radial-gradient(circle at 34% 28%, #fff, #f6f3e8 52%, #d8b75a 86%);
      border: 2px solid rgba(255,248,223,.9);
      box-shadow: 0 8px 13px rgba(0,0,0,.46), 0 0 18px rgba(244,226,160,.52);
    }
    .roulette-reveal.finished .roulette-ball,
    .roulette-reveal.complete .roulette-ball {
      top: 22%;
    }
    .roulette-reveal.finished .roulette-ball-layer,
    .roulette-reveal.complete .roulette-ball-layer {
      transform: rotate(var(--ball-final, 90deg));
    }
    .roulette-reveal.spinning .roulette-ball-layer {
      animation: roulette-ball-counter var(--roulette-duration, 4600ms) cubic-bezier(.08,.72,.06,1) forwards;
    }
    .roulette-reveal.spinning .roulette-ball {
      animation: roulette-ball-drop var(--roulette-duration, 4600ms) cubic-bezier(.12,.65,.08,1) forwards;
    }
    .roulette-result {
      position: absolute; left: 50%; top: 50%; z-index: 8;
      transform: translate(-50%, -50%) scale(.92);
      min-width: min(520px, 70vw);
      padding: 24px 34px; border-radius: 8px;
      background: rgba(4, 41, 31, .86);
      border: 1px solid rgba(244,226,160,.42);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 18px 34px rgba(0,0,0,.36);
      color: #f4e2a0; opacity: 1;
    }
    .roulette-reveal.spinning .roulette-result {
      opacity: 0;
      animation: roulette-result-pop .32s cubic-bezier(.18,.84,.2,1.18) var(--result-delay, 4300ms) forwards;
    }
    .roulette-result div {
      text-transform: uppercase; letter-spacing: .2em;
      font-size: clamp(.85rem, 1.3vw, 1.05rem); font-weight: 900;
    }
    .roulette-result b {
      display: block; margin-top: 7px;
      color: #fff8df; font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(3.6rem, 6.8vw, 6.6rem); line-height: .9;
      text-shadow: 0 0 20px rgba(244,226,160,.28);
    }
    @keyframes roulette-wheel-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(var(--wheel-final, 0deg)); }
    }
    @keyframes roulette-ball-counter {
      0% { transform: rotate(0deg); }
      82% { transform: rotate(var(--ball-final, -3240deg)); }
      100% { transform: rotate(var(--ball-final, -3240deg)); }
    }
    @keyframes roulette-ball-drop {
      0% { top: 6%; }
      72% { top: 6%; }
      84% { top: 10%; }
      92% { top: 18%; }
      100% { top: 22%; }
    }
    @keyframes roulette-result-pop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(.82); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes roulette-target-glow {
      to { filter: drop-shadow(0 0 18px rgba(244,226,160,.85)); }
    }
    @keyframes roulette-stage-in {
      from { opacity: 0; transform: scale(.92); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes roulette-copy-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes cornhole-copy-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes cornhole-card-deal {
      0% { opacity: 0; transform: translateY(440px) translateX(calc((var(--card-index) - .5) * -160px)) rotate(calc((var(--card-index) - .5) * -20deg)); }
      28% { opacity: 1; transform: translateY(0) translateX(0) rotate(0deg); }
      100% { opacity: 1; transform: translateY(0) translateX(0) rotate(0deg); }
    }
    @keyframes cornhole-card-flip {
      0%, 42% { transform: rotateY(180deg); }
      70%, 100% { transform: rotateY(0deg); }
    }
    @keyframes cornhole-result-pop {
      from { opacity: 0; transform: translateY(16px) scale(.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes bandit-reel-spin {
      from { transform: translateY(0); }
      to { transform: translateY(calc(-1 * var(--reel-steps, 0) * (var(--bandit-symbol-height) + var(--bandit-gap)))); }
    }
    @keyframes lever-pull {
      0% { transform: rotate(0deg); }
      42% { transform: rotate(34deg); }
      100% { transform: rotate(34deg); }
    }
    @keyframes bandit-light {
      0%, 100% { filter: brightness(1.1); }
      50% { filter: brightness(.55); }
    }

    @media (max-width: 900px) {
      .table-scene { height: min(600px, 74vh); }
      .poker-table { width: min(650px, 74vw); height: min(320px, 42vh); border-width: 10px; }
      .table-seat { min-width: 145px; }
      .seat-avatar { width: 92px; height: 92px; font-size: 1.6rem; border-width: 6px; }
      .seat-name { font-size: 1.35rem; max-width: 150px; }
      .coin-pill { font-size: 1.25rem; min-height: 38px; padding: 5px 14px; }
      .bandit-machine { width: min(720px, 78vw); padding: 88px 28px 32px; }
      .bandit-dome { height: 104px; top: -52px; }
      .bandit-lights { top: 58px; left: 22px; right: 22px; }
      .bandit-lights span { width: 16px; height: 16px; border-width: 2px; }
      .bandit-face { padding: 14px; border-width: 5px; }
      .bandit-reels { gap: 12px; }
      .bandit-reel-window { height: 130px; border-width: 5px; padding: 5px; }
      .bandit-reel-track { --bandit-symbol-height: 112px; --bandit-gap: 14px; }
      .bandit-symbol { height: var(--bandit-symbol-height); flex-basis: var(--bandit-symbol-height); }
      .bandit-symbol span { font-size: 1rem; }
      .bandit-console { grid-template-columns: 48px 48px 48px 1fr; gap: 12px; padding: 12px; }
      .bandit-button { width: 46px; height: 28px; border-width: 4px; }
      .bandit-base { min-height: 70px; width: 84%; }
      .bandit-lever { right: -74px; top: 180px; transform: scale(.72); transform-origin: top left; }
      .cornhole-table { min-height: 380px; padding: 38px 28px 32px; border-width: 6px; border-radius: 60px; }
      .cornhole-slots { gap: 18px; width: min(620px, 82vw); }
      .cornhole-slot { height: 230px; }
      .cornhole-card { width: min(170px, 34vw); }
      .cornhole-card-face { border-width: 5px; border-radius: 14px; }
      .cornhole-card-title { font-size: clamp(1.55rem, 4vw, 2.6rem); }
      .cornhole-result { min-width: min(420px, 72vw); padding: 14px 18px; }
      .roulette-stage { width: min(540px, 76vw); }
      .roulette-reveal.complete .roulette-stage { width: min(400px, 76vw); }
      .roulette-segment text { font-size: 8px; stroke-width: 2.8px; }
      .roulette-segment.target text { font-size: 12px; }
      .roulette-result { min-width: min(340px, 70vw); padding: 16px 20px; }
    }

    footer.scores {
      padding: 18px 28px; border-top: 1px solid var(--line);
      background: linear-gradient(180deg, #19080d, var(--bg2));
    }

    /* Buzzer-Gewinner-Overlay */
    #winner {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center; flex-direction: column;
      background: rgba(0,0,0,.65); z-index: 50;
    }
    #winner.show { display: flex; animation: pop .25s ease; }
    #winner .wname { font-size: 5rem; font-weight: 900; text-shadow: 0 0 18px rgba(255,209,92,.5); }
    #winner .wsub { font-size: 1.6rem; color: var(--muted); margin-top: 10px; }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .qr-corner { position: absolute; right: 18px; bottom: 18px; text-align: center; opacity: .85; }
    .qr-corner img { width: 120px; height: 120px; background: #fff; padding: 6px; border-radius: 10px; }
    .qr-corner div { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  </style>
</head>
