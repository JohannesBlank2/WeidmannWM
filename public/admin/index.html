<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WEIDMANN WM Poker Edition - Admin</title>
  <link rel="stylesheet" href="/shared/style.css" />
  <style>
    body { padding: 10px 12px; max-width: 1180px; margin: 0 auto; overflow-y: auto; min-height: 100vh; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    section.card { margin-bottom: 10px; padding: 12px; }
    h2 { font-size: 1rem; margin-bottom: 6px; }
    .admin-layout { display: grid; gap: 10px; align-items: start; }
    .admin-main, .admin-side { min-width: 0; }

    /* Ablauf */
    .round-banner { font-size: .95rem; margin-bottom: 8px; }
    .round-banner b { font-size: 1.05rem; }
    .flow { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .flow button { padding: 9px 10px; font-weight: 700; min-height: 38px; }
    .pickrow { margin-top: 8px; }
    .pickrow .lbl, .featured-games > .lbl, .compact-label {
      color: var(--muted); font-size: .76rem; margin-bottom: 2px; font-weight: 900;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .control-cluster { display: grid; gap: 10px; }
    .direct-start {
      display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; align-items: center;
      padding-top: 8px; border-top: 1px solid rgba(111,43,34,.75);
    }
    .direct-start label { margin: 0; white-space: nowrap; }
    .admin-select {
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 8px; padding: 8px 10px; font: inherit; font-weight: 800;
    }

    /* Buzzer */
    .phase-pill { padding: 4px 12px; border-radius: 999px; background: var(--panel);
      border: 1px solid var(--line); text-transform: capitalize; font-size: .9rem; }

    /* Spieler */
    .player-row {
      display: grid; grid-template-columns: 14px minmax(92px, 1fr) auto auto; align-items: center;
      grid-template-areas: "dot name coins game";
      gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--line);
    }
    .player-row .dot { grid-area: dot; width: 12px; height: 12px; border-radius: 50%; }
    .player-row input[type=text] {
      grid-area: name;
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 7px; padding: 6px 8px; font: inherit; font-weight: 800;
    }
    .ptbox { display: inline-grid; grid-template-columns: auto 34px 42px 34px; align-items: center; gap: 4px; }
    .player-row .ptbox:not(.game) { grid-area: coins; }
    .player-row .ptbox.game { grid-area: game; }
    .ptbox .tag { color: var(--muted); font-size: .75rem; }
    .ptbox .sc { font-weight: 800; font-size: 1rem; min-width: 2.2ch; text-align: center; }
    .ptbox.game .sc { color: var(--accent); }
    .ptbox button { padding: 6px 6px; min-width: 0; font-weight: 900; }
    .score-input {
      width: 42px; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 7px; padding: 6px 4px; font: inherit;
      font-size: .98rem; font-weight: 900; text-align: center;
    }
    .ptbox.game .score-input { color: var(--accent); }

    .ambient-admin-status {
      margin-bottom: 8px;
      color: var(--muted); font-weight: 800;
      font-size: .82rem;
    }
    .ambient-admin-status b { color: var(--accent); font-size: 1rem; }
    .ambient-admin-compact {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center;
    }
    .ambient-volume {
      display: grid; grid-template-columns: minmax(0, 1fr) 42px; gap: 8px; align-items: center;
      margin-top: 8px; color: var(--muted); font-weight: 900;
    }
    .ambient-volume input { width: 100%; accent-color: var(--accent); }

    .client-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
      background: var(--panel); border: 1px solid var(--line); margin: 3px; }
    .client-pill .d { width: 9px; height: 9px; border-radius: 50%; }
    .game-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); }
    .game-item .info .nm { font-weight: 700; }
    .game-item .info .mt { color: var(--muted); font-size: .85rem; }
    .bigbtn { flex: 1; padding: 11px 12px; font-size: .98rem; font-weight: 700; }
    .featured-games { display: grid; gap: 6px; }
    .featured-game-row {
      display: grid; grid-template-columns: 44px minmax(0, 1fr) auto auto; gap: 6px; align-items: center;
      padding: 6px 7px; border: 1px solid var(--line); border-radius: 8px;
      background: rgba(18, 7, 10, .45);
    }
    .featured-game-row.current {
      border-color: var(--accent); box-shadow: 0 0 0 1px rgba(255,209,92,.2) inset;
    }
    .featured-game-slot {
      color: var(--muted); font-size: .78rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .04em; white-space: nowrap;
    }
    .featured-game-name {
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 7px; padding: 7px 9px; font: inherit; font-weight: 800;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .featured-game-row.current .featured-game-name { border-color: var(--accent); }
    .featured-game-action { min-width: 76px; padding: 8px 10px; font-weight: 800; }
    .featured-game-meta {
      grid-column: 2 / -1; color: var(--muted); font-size: .76rem; font-weight: 700;
      margin-top: -3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .spin-admin-list { display: grid; gap: 8px; margin-top: 8px; }
    .game-detail.mini { padding: 10px 12px; }
    .admin-field-label {
      display: block; margin: 12px 0 6px; color: var(--muted);
      font-size: .82rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em;
    }
    .admin-text-input {
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 8px; padding: 10px 12px; font: inherit; font-weight: 800;
    }
    .musik-admin-current {
      display: grid; grid-template-columns: 58px minmax(0, 1fr); gap: 10px; align-items: center;
      margin-top: 10px; padding: 10px; border: 1px solid rgba(255,209,92,.24); border-radius: 8px;
      background: rgba(18, 7, 10, .58);
    }
    .musik-admin-current img {
      width: 58px; height: 58px; border-radius: 6px; object-fit: cover;
      border: 1px solid rgba(255,209,92,.38);
    }
    .musik-admin-song-list {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 6px; margin-top: 10px; max-height: 190px; overflow: auto;
      padding-right: 3px;
    }
    .musik-admin-song-list button {
      min-height: 40px; text-align: left; padding: 8px 10px; font-size: .86rem; font-weight: 800;
    }
    .musik-admin-song-list span { color: var(--muted); }
    .musik-admin-song-list button.primary span { color: rgba(36,17,4,.72); }
    .percent-question-list {
      display: grid; gap: 7px; margin-top: 10px;
    }
    .percent-question-list button {
      display: grid; gap: 4px; text-align: left; padding: 10px 12px;
    }
    .percent-question-list span {
      color: var(--muted); font-size: .82rem; font-weight: 700;
    }
    .percent-question-list button.primary span { color: rgba(36,17,4,.72); }
    .percent-selected-admin {
      margin-top: 10px; border-color: rgba(255,209,92,.32);
    }
    .halbe-admin-winner {
      border-color: var(--accent); box-shadow: 0 0 0 1px rgba(255,209,92,.26) inset;
    }
    .halbe-weight-field {
      flex: 1 1 120px; display: grid; gap: 4px;
      color: var(--muted); font-size: .78rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .halbe-weight-field input {
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 8px; padding: 10px 12px; font: inherit;
      font-size: 1rem; font-weight: 900;
    }
    .halbe-admin-winner .halbe-weight-field input {
      border-color: rgba(255,209,92,.52);
    }
    .dart-ringe-admin-finale {
      border-color: var(--accent); box-shadow: 0 0 0 1px rgba(255,209,92,.26) inset;
    }
    .fish-item-admin {
      display: grid; grid-template-columns: minmax(0, 1fr) 120px; gap: 8px;
      align-items: end;
    }
    .fish-item-admin label {
      display: grid; gap: 4px; color: var(--muted);
      font-size: .78rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em;
    }
    .fish-item-admin input {
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--text); border-radius: 8px; padding: 9px 10px; font: inherit; font-weight: 800;
    }
    .fish-admin-winner {
      border-color: var(--accent); box-shadow: 0 0 0 1px rgba(255,209,92,.26) inset;
    }
    .fish-total-admin-list {
      display: grid; gap: 7px; margin: 8px 0;
    }
    .fish-total-admin-row {
      display: grid; grid-template-columns: minmax(0, 1fr) 110px; gap: 8px; align-items: center;
      color: var(--muted); font-weight: 900;
    }
    .fish-total-admin-row span {
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .fish-total-admin-row input {
      width: 100%; min-width: 0; background: var(--panel); border: 1px solid var(--line);
      color: var(--accent); border-radius: 8px; padding: 8px 10px; font: inherit;
      font-weight: 900; text-align: right;
    }
    .utility-card { padding: 10px 12px; }
    .utility-card h2 { margin-bottom: 6px; }
    .utility-card details > summary {
      cursor: pointer; font-size: 1rem; font-weight: 900;
      list-style-position: inside;
    }
    .utility-card details > div { margin-top: 10px; }
    @media (min-width: 900px) {
      body { padding: 12px 16px; }
      .admin-layout { grid-template-columns: minmax(0, 1fr) minmax(450px, .9fr); }
    }
    @media (max-width: 980px) {
      .player-row {
        grid-template-columns: 12px minmax(92px, 1fr) auto;
        grid-template-areas:
          "dot name coins"
          ". . game";
      }
      .ptbox { grid-template-columns: auto 32px 40px 32px; }
    }
    @media (max-width: 720px) {
      .flow, .direct-start, .featured-game-row { grid-template-columns: 1fr; }
      .featured-game-meta { grid-column: auto; }
    }
    @media (max-width: 560px) {
      .player-row {
        grid-template-columns: 12px minmax(92px, 1fr);
        grid-template-areas:
          "dot name"
          "coins coins"
          "game game";
      }
      .fish-item-admin { grid-template-columns: 1fr; }
      .fish-total-admin-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="row" style="justify-content:space-between; margin-bottom:10px;">
    <h1 style="margin:0; font-size:1.4rem;">Admin</h1>
    <div class="row">
      <span class="phase-pill" id="phase-pill">lobby</span>
      <span class="conn-badge offline" data-conn>getrennt</span>
    </div>
  </div>

  <div class="admin-layout">
    <main class="admin-main">
      <!-- Ablauf / Runden -->
      <section class="card">
        <h2>Ablauf</h2>
        <div class="round-banner" id="round-banner"></div>
        <div class="flow row">
          <button data-flow="show-lobby">Tisch anzeigen</button>
          <button class="bad" data-flow="stop-game">Spiel beenden → Auswertung</button>
          <button data-flow="goto-finale">→ Finale</button>
        </div>
        <div class="control-cluster" style="margin-top:10px;">
          <div class="featured-games" id="featured-games"></div>
          <div class="direct-start">
            <label class="compact-label" for="game-start-select">Weiterer Direktstart</label>
            <select class="admin-select" id="game-start-select"></select>
            <button class="primary" id="game-start-btn">Starten</button>
          </div>
        </div>
        <div class="pickrow" id="picker-area"></div>
        <div id="active-game" class="muted" style="margin-top:8px;"></div>
      </section>
    </main>

    <aside class="admin-side">
      <!-- Spieler + Punkte -->
      <section class="card">
        <h2>Spieler · Coins</h2>
        <div id="players"></div>
        <div class="row" style="margin-top:10px;">
          <button data-flow="reset-game-points">Spielpunkte auf 0</button>
        </div>
      </section>

      <!-- Buzzer -->
      <section class="card">
        <h2>Buzzer <span class="muted" id="buzz-state" style="font-size:.85rem"></span></h2>
        <div class="row">
          <button class="bigbtn good" data-buzz="arm">Freigeben</button>
          <button class="bigbtn" data-buzz="reset">Zurücksetzen</button>
          <button class="bigbtn bad" data-buzz="lock">Sperren</button>
        </div>
        <div id="buzz-order" class="muted" style="margin-top:10px;"></div>
      </section>

      <!-- Audio -->
      <section class="card utility-card">
        <h2>Audio</h2>
        <div id="ambient-music-admin"></div>
        <button class="bigbtn good" id="winner-sound-btn" style="margin-top:8px;">▶ Winner Sound abspielen</button>
      </section>

      <!-- Weitere Tools -->
      <section class="card utility-card">
        <details>
          <summary>Weitere Tools</summary>
          <div>
            <h2>Mini-Casino · Crash</h2>
            <div id="crash-admin"></div>
          </div>
          <div>
            <h2>Zurücksetzen</h2>
            <button class="bad" id="reset-all">Alles zurücksetzen (Coins & Ablauf)</button>
          </div>
        </details>
      </section>
    </aside>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>window.APP_ROLE = 'admin';</script>
  <script src="/shared/client.js"></script>
  <script src="./admin.js"></script>
  <script src="./crash-admin.js"></script>
  <script src="./betting-irl-admin.js"></script>
</body>
</html>
